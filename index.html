<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#101820">
  <title>AZ Terminal</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      min-height: 100%;
      background: #0b1017;
      color: #ffffff;
      font-family: Arial, Helvetica, sans-serif;
      -webkit-font-smoothing: antialiased;
      -webkit-text-size-adjust: 100%;
      touch-action: manipulation;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: rgba(0, 0, 0, 0);
    }

    button, input {
      font: inherit;
    }

    button {
      cursor: pointer;
      border: 0;
      line-height: 1.15;
      white-space: normal;
      word-wrap: break-word;
    }

    .kiosk {
      min-height: 100vh;
      padding: 14px;
      background: linear-gradient(135deg, #111827 0%, #0b1017 55%, #18202a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .shell {
      width: 100%;
      max-width: 1120px;
      height: -webkit-calc(100vh - 28px);
      height: calc(100vh - 28px);
      min-height: 640px;
      max-height: 860px;
      border: 12px solid #202b38;
      border-radius: 24px;
      overflow: hidden;
      background: #111923;
      box-shadow: 0 24px 70px rgba(0, 0, 0, .42), inset 0 0 0 2px rgba(255, 255, 255, .06);
      display: flex;
      flex-direction: column;
    }

    .topbar {
      min-height: 78px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(180deg, #1f2d3b 0%, #14202c 100%);
      border-bottom: 1px solid rgba(255, 255, 255, .08);
      gap: 12px;
    }

    .brand {
      display: flex;
      align-items: center;
      min-width: 230px;
      gap: 12px;
    }

    .brand-mark {
      width: 48px;
      height: 48px;
      border-radius: 10px;
      background: linear-gradient(145deg, #00a3ff 0%, #18c67a 100%);
      color: #ffffff;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      letter-spacing: .5px;
      box-shadow: inset 0 -7px 14px rgba(0, 0, 0, .16);
    }

    .brand-title {
      margin: 0;
      font-size: 19px;
      line-height: 1.1;
      font-weight: 800;
      letter-spacing: 0;
    }

    .brand-subtitle {
      margin-top: 3px;
      color: #a9bacb;
      font-size: 12px;
      letter-spacing: .5px;
      text-transform: uppercase;
    }

    .clock {
      color: #dce7f2;
      font-size: 15px;
      font-weight: 700;
      white-space: nowrap;
      text-align: center;
      min-width: 150px;
    }

    .langbar {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .langbar button,
    .top-action {
      min-width: 52px;
      min-height: 44px;
      padding: 0 12px;
      border-radius: 8px;
      background: #2b3a49;
      color: #ffffff;
      font-weight: 800;
      box-shadow: inset 0 -2px 0 rgba(0, 0, 0, .2);
    }

    .langbar button.active {
      background: #ffffff;
      color: #152232;
    }

    .main {
      flex: 1;
      min-height: 0;
      display: flex;
      background: #eef2f5;
    }

    .side {
      width: 226px;
      padding: 14px;
      background: #182333;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .side button {
      min-height: 58px;
      padding: 11px 12px;
      border-radius: 8px;
      text-align: left;
      color: #dfe9f4;
      background: #233246;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      box-shadow: inset 0 -2px 0 rgba(0, 0, 0, .18);
    }

    .side button.active,
    .side button:active {
      background: #0f9f7a;
      color: #ffffff;
    }

    .side .quick {
      margin-top: auto;
      background: #cc2633;
    }

    .side-code {
      width: 42px;
      height: 34px;
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, .12);
      font-size: 12px;
      font-weight: 900;
      flex: 0 0 auto;
    }

    .content {
      flex: 1;
      min-width: 0;
      color: #172335;
      background: #f4f7fa;
      padding: 18px;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      position: relative;
    }

    .terminal-stage {
      flex: 1;
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      background: #f4f7fa;
      position: relative;
    }

    .language-screen {
      flex: 1;
      background: #f4f7fa;
      color: #142033;
      padding: 24px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 22px;
    }

    .hero-panel {
      width: 100%;
      max-width: 780px;
      margin: 0 auto;
      padding: 22px;
      border-radius: 10px;
      background: #ffffff;
      box-shadow: 0 12px 34px rgba(27, 44, 63, .12);
      border: 1px solid #dde7ef;
    }

    .hero-title {
      margin: 0 0 8px;
      font-size: 34px;
      line-height: 1.05;
      color: #102033;
      letter-spacing: 0;
    }

    .hero-note {
      margin: 0;
      color: #5e6d7c;
      font-size: 17px;
      line-height: 1.45;
    }

    .language-grid,
    .tiles,
    .provider-list,
    .amount-presets,
    .cash-grid,
    .receipt-actions,
    .history-list {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .language-grid button {
      flex: 1 1 180px;
      min-height: 96px;
      border-radius: 10px;
      color: #ffffff;
      background: #1079c8;
      text-align: left;
      padding: 18px;
      font-size: 22px;
      font-weight: 900;
      box-shadow: inset 0 -5px 0 rgba(0, 0, 0, .13);
    }

    .language-grid button:nth-child(2) {
      background: #13a173;
    }

    .language-grid button:nth-child(3) {
      background: #d52b3a;
    }

    .screen-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 16px;
    }

    .corner-back {
      position: absolute;
      left: 16px;
      bottom: 16px;
      z-index: 20;
      min-height: 58px;
      min-width: 166px;
      padding: 0 20px;
      border-radius: 8px;
      background: #0f9f7a;
      color: #ffffff;
      font-size: 19px;
      font-weight: 900;
      box-shadow: inset 0 -4px 0 rgba(0, 0, 0, .2), 0 8px 18px rgba(15, 159, 122, .22);
    }

    .corner-back span {
      font-size: 24px;
      vertical-align: -1px;
    }

    .screen-title {
      margin: 0;
      color: #102033;
      font-size: 30px;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .screen-kicker {
      margin: 4px 0 0;
      color: #647383;
      line-height: 1.35;
      font-size: 15px;
    }

    .status-pill {
      color: #ffffff;
      background: #14324d;
      border-radius: 999px;
      padding: 9px 12px;
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }

    .tile,
    .provider,
    .amount-btn,
    .cash-btn,
    .action-btn,
    .history-item {
      border-radius: 8px;
      background: #ffffff;
      color: #152335;
      border: 1px solid #dae5ee;
      box-shadow: 0 4px 10px rgba(26, 42, 62, .08);
    }

    .tile {
      flex: 1 1 190px;
      min-height: 132px;
      padding: 16px;
      text-align: left;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 12px;
    }

    .tile:active,
    .provider:active,
    .amount-btn:active,
    .cash-btn:active,
    .action-btn:active,
    .key:active {
      transform: translateY(1px);
    }

    .tile-code {
      width: 62px;
      height: 42px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      background: #1079c8;
      font-size: 13px;
      font-weight: 900;
    }

    .tile:nth-child(2n) .tile-code {
      background: #0fa071;
    }

    .tile:nth-child(3n) .tile-code {
      background: #cc2633;
    }

    .tile h3,
    .provider h3 {
      margin: 0;
      font-size: 19px;
      line-height: 1.18;
      letter-spacing: 0;
    }

    .tile p,
    .provider p,
    .small-muted {
      margin: 4px 0 0;
      color: #667789;
      line-height: 1.32;
      font-size: 14px;
    }

    .provider {
      flex: 1 1 220px;
      min-height: 106px;
      padding: 15px;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .provider-logo {
      width: 58px;
      height: 58px;
      border-radius: 10px;
      background: #e9f1f8;
      color: #142033;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      flex: 0 0 auto;
      border: 1px solid #d7e3ed;
    }

    .form-layout {
      display: flex;
      align-items: stretch;
      gap: 18px;
    }

    .panel {
      background: #ffffff;
      border: 1px solid #dae5ee;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(26, 42, 62, .08);
      padding: 16px;
    }

    .entry-panel {
      flex: 1 1 auto;
      min-width: 0;
    }

    .keypad-panel {
      flex: 0 0 302px;
    }

    .display-field {
      min-height: 74px;
      border-radius: 8px;
      background: #edf3f8;
      border: 2px solid #d4e2ed;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
      margin: 14px 0;
      color: #102033;
      font-size: 28px;
      font-weight: 900;
      word-break: break-word;
      text-align: center;
    }

    .display-field.empty {
      color: #8a98a7;
      font-size: 20px;
      font-weight: 800;
    }

    .keypad {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .key {
      width: 31.4%;
      min-height: 62px;
      border-radius: 8px;
      background: #243346;
      color: #ffffff;
      font-size: 24px;
      font-weight: 900;
      box-shadow: inset 0 -3px 0 rgba(0, 0, 0, .2);
    }

    .key.utility {
      background: #536273;
      font-size: 15px;
    }

    .amount-presets {
      margin: 14px 0;
    }

    .amount-btn {
      flex: 1 1 120px;
      min-height: 64px;
      font-size: 20px;
      font-weight: 900;
      color: #102033;
      background: #ffffff;
    }

    .summary {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 14px 0;
    }

    .summary-card {
      flex: 1 1 150px;
      min-height: 82px;
      padding: 13px;
      background: #edf3f8;
      border: 1px solid #d7e3ed;
      border-radius: 8px;
    }

    .summary-card span {
      display: block;
      color: #667789;
      font-size: 13px;
      font-weight: 800;
      margin-bottom: 5px;
    }

    .summary-card strong {
      color: #102033;
      font-size: 20px;
      line-height: 1.1;
      word-break: break-word;
    }

    .cashbox {
      display: flex;
      gap: 18px;
      align-items: stretch;
    }

    .cash-left {
      flex: 1 1 auto;
      min-width: 0;
    }

    .cash-right {
      flex: 0 0 290px;
    }

    .cash-slot {
      height: 92px;
      border-radius: 14px;
      background: #1c2634;
      margin: 8px 0 16px;
      border: 8px solid #303c4c;
      box-shadow: inset 0 0 0 4px #0b1017, inset 0 -20px 30px rgba(0, 0, 0, .45);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #bed0e0;
      font-weight: 900;
      letter-spacing: .8px;
      text-transform: uppercase;
    }

    .cash-btn {
      flex: 1 1 86px;
      min-height: 58px;
      background: #ffffff;
      color: #102033;
      font-size: 20px;
      font-weight: 900;
    }

    .cash-btn.primary {
      background: #0fa071;
      color: #ffffff;
      border-color: #0fa071;
    }

    .notice {
      padding: 12px 14px;
      border-radius: 8px;
      background: #fff7da;
      border: 1px solid #efd889;
      color: #58451a;
      font-weight: 700;
      line-height: 1.35;
      margin: 12px 0;
    }

    .notice.good {
      background: #e9f8f1;
      border-color: #bce6d3;
      color: #14583e;
    }

    .notice.bad {
      background: #ffecee;
      border-color: #efb6be;
      color: #7e1e29;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    .action-btn {
      min-height: 56px;
      padding: 0 18px;
      color: #ffffff;
      background: #1079c8;
      border-color: #1079c8;
      font-weight: 900;
      font-size: 16px;
      min-width: 136px;
    }

    .action-btn.secondary {
      color: #142033;
      background: #ffffff;
      border-color: #dae5ee;
    }

    .action-btn.danger {
      background: #cc2633;
      border-color: #cc2633;
    }

    .action-btn.success {
      background: #0fa071;
      border-color: #0fa071;
    }

    .action-btn[disabled],
    .action-btn.disabled {
      background: #acb8c4;
      border-color: #acb8c4;
      color: #f4f7fa;
      cursor: default;
      transform: none;
    }

    .progress {
      height: 16px;
      border-radius: 999px;
      background: #dce7ef;
      overflow: hidden;
      margin: 20px 0;
    }

    .progress span {
      display: block;
      height: 100%;
      width: 72%;
      background: linear-gradient(90deg, #1079c8, #0fa071);
      border-radius: 999px;
      -webkit-animation: progressMove 1.1s ease-in-out infinite alternate;
      animation: progressMove 1.1s ease-in-out infinite alternate;
    }

    @-webkit-keyframes progressMove {
      from { width: 38%; }
      to { width: 92%; }
    }

    @keyframes progressMove {
      from { width: 38%; }
      to { width: 92%; }
    }

    .receipt {
      max-width: 520px;
      margin: 0 auto;
      background: #ffffff;
      border: 1px solid #d9e5ee;
      border-radius: 10px;
      padding: 18px;
      color: #102033;
      box-shadow: 0 10px 28px rgba(26, 42, 62, .12);
    }

    .receipt h2 {
      margin: 0 0 10px;
      font-size: 24px;
      letter-spacing: 0;
    }

    .receipt-row {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      border-top: 1px dashed #cad7e2;
      padding: 10px 0;
      color: #425263;
      line-height: 1.3;
    }

    .receipt-row strong {
      color: #102033;
      text-align: right;
      max-width: 62%;
      word-break: break-word;
    }

    .receipt-ok {
      margin-top: 10px;
      padding: 12px;
      border-radius: 8px;
      background: #e9f8f1;
      color: #14583e;
      font-weight: 900;
      text-align: center;
    }

    .history-item {
      flex: 1 1 260px;
      min-height: 116px;
      padding: 14px;
      text-align: left;
    }

    .history-item h3 {
      margin: 0 0 8px;
      font-size: 17px;
      line-height: 1.2;
    }

    .help-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .help-grid .panel {
      flex: 1 1 240px;
    }

    .help-grid h3 {
      margin: 0 0 8px;
      font-size: 19px;
    }

    .help-grid p {
      margin: 0;
      color: #5f6f80;
      line-height: 1.45;
    }

    /* iOS 8 Safari has no flex gap support, so spacing is margin-based. */
    .kiosk,
    .shell,
    .topbar,
    .brand,
    .brand-mark,
    .langbar,
    .main,
    .side,
    .side button,
    .side-code,
    .terminal-stage,
    .language-screen,
    .language-grid,
    .screen-head,
    .tiles,
    .tile,
    .tile-code,
    .provider-list,
    .provider,
    .provider-logo,
    .form-layout,
    .display-field,
    .keypad,
    .amount-presets,
    .summary,
    .cashbox,
    .cash-grid,
    .cash-slot,
    .actions,
    .receipt-row,
    .history-list,
    .help-grid,
    .help-grid {
      display: -webkit-flex;
      display: flex;
    }

    .shell,
    .side,
    .terminal-stage,
    .language-screen,
    .tile {
      -webkit-flex-direction: column;
      flex-direction: column;
    }

    .langbar,
    .language-grid,
    .tiles,
    .provider-list,
    .keypad,
    .amount-presets,
    .summary,
    .cash-grid,
    .actions,
    .history-list,
    .help-grid {
      -webkit-flex-wrap: wrap;
      flex-wrap: wrap;
    }

    .kiosk,
    .brand,
    .side button,
    .side-code,
    .display-field,
    .provider,
    .provider-logo,
    .tile-code,
    .cash-slot {
      -webkit-align-items: center;
      align-items: center;
    }

    .kiosk,
    .brand-mark,
    .side-code,
    .display-field,
    .provider-logo,
    .tile-code,
    .cash-slot {
      -webkit-justify-content: center;
      justify-content: center;
    }

    .topbar,
    .side button,
    .screen-head,
    .tile,
    .receipt-row {
      -webkit-justify-content: space-between;
      justify-content: space-between;
    }

    .langbar {
      -webkit-justify-content: flex-end;
      justify-content: flex-end;
    }

    .shell,
    .main,
    .content,
    .terminal-stage,
    .language-screen,
    .entry-panel,
    .cash-left {
      -webkit-flex: 1 1 auto;
      flex: 1 1 auto;
    }

    .keypad-panel {
      -webkit-flex: 0 0 302px;
      flex: 0 0 302px;
    }

    .cash-right {
      -webkit-flex: 0 0 290px;
      flex: 0 0 290px;
    }

    .topbar,
    .brand,
    .langbar,
    .side,
    .side button,
    .language-screen,
    .language-grid,
    .screen-head,
    .tiles,
    .tile,
    .provider-list,
    .provider,
    .form-layout,
    .keypad,
    .summary,
    .cashbox,
    .cash-grid,
    .actions,
    .receipt-row,
    .history-list,
    .help-grid {
      gap: 0;
    }

    .topbar > *,
    .brand > *,
    .langbar > *,
    .screen-head > *,
    .form-layout > *,
    .cashbox > *,
    .receipt-row > * {
      margin-left: 6px;
      margin-right: 6px;
    }

    .topbar > *:first-child,
    .brand > *:first-child,
    .langbar > *:first-child,
    .screen-head > *:first-child,
    .form-layout > *:first-child,
    .cashbox > *:first-child,
    .receipt-row > *:first-child {
      margin-left: 0;
    }

    .topbar > *:last-child,
    .brand > *:last-child,
    .langbar > *:last-child,
    .screen-head > *:last-child,
    .form-layout > *:last-child,
    .cashbox > *:last-child,
    .receipt-row > *:last-child {
      margin-right: 0;
    }

    .language-grid,
    .tiles,
    .provider-list,
    .keypad,
    .amount-presets,
    .summary,
    .cash-grid,
    .actions,
    .history-list,
    .help-grid {
      margin-left: -6px;
      margin-right: -6px;
    }

    .language-grid > *,
    .tiles > *,
    .provider-list > *,
    .keypad > *,
    .amount-presets > *,
    .summary > *,
    .cash-grid > *,
    .actions > *,
    .history-list > *,
    .help-grid > * {
      margin: 6px;
    }

    .side button {
      margin-bottom: 10px;
    }

    .side button:last-child {
      margin-bottom: 0;
    }

    @media (max-height: 760px) and (min-width: 821px) {
      .kiosk {
        padding: 0;
      }

      .shell {
        height: 100vh;
        min-height: 0;
        max-height: none;
        border-width: 8px;
        border-radius: 14px;
      }

      .topbar {
        min-height: 64px;
        padding-top: 8px;
        padding-bottom: 8px;
      }

      .content {
        padding: 14px;
      }

      .screen-title {
        font-size: 26px;
      }

      .tile {
        min-height: 112px;
      }

    }

    @media (max-width: 820px) {
      .kiosk {
        padding: 0;
      }

      .shell {
        height: 100vh;
        min-height: 100vh;
        max-height: none;
        border: 0;
        border-radius: 0;
      }

      .topbar {
        min-height: 68px;
        padding: 10px;
      }

      .brand {
        min-width: 0;
      }

      .brand-mark {
        width: 42px;
        height: 42px;
      }

      .brand-title {
        font-size: 16px;
      }

      .brand-subtitle,
      .clock {
        display: none;

        render();

      function goBack(syncBrowser) {
        var snapshot;
        if (!canGoBack()) return false;
        snapshot = state.navStack.pop();
        restoreSnapshot(snapshot);
        if (syncBrowser && state.browserHistoryReady && window.history && window.history.back) {
          state.skipNextPop = true;
          try {
            window.history.back();
          } catch (e) {
            state.skipNextPop = false;
          }
        }
        render();
        return true;
      }

      function initBrowserNavigation() {
        if (!window.history || !window.history.pushState || !window.history.replaceState) {
          state.browserHistoryReady = false;
          return;
        }
        replaceBrowserStep();
        state.browserHistoryReady = true;
        window.onpopstate = function () {
          if (state.skipNextPop) {
            state.skipNextPop = false;
            return;
          }
          if (!goBack(false) && state.screen !== 'home' && state.screen !== 'language') {
            hardGoHome();
          }
        };
      }

      function updateClock() {
        var node = document.getElementById('clock');
        if (!node) return;
        var now = new Date();
        var dd = pad(now.getDate());
        var mm = pad(now.getMonth() + 1);
        var yyyy = now.getFullYear();
        var hh = pad(now.getHours());
        var min = pad(now.getMinutes());
        node.innerHTML = dd + '.' + mm + '.' + yyyy + ' &nbsp; ' + hh + ':' + min;
      }

      function supportsFullscreen() {
        var doc = document.documentElement;
        return !!(doc.requestFullscreen || doc.webkitRequestFullscreen || doc.mozRequestFullScreen || doc.msRequestFullscreen);
      }

      function pad(value) {
        return value < 10 ? '0' + value : String(value);
      }

          '</div>'

      function renderInput() {
        var type = inputType();
        if (type === 'none') {

        var label = type === 'phone' ? tr('phoneInput') : (type === 'card' ? tr('cardInput') : tr('accountInput'));

      function renderAmount() {

      function renderCash() {

          renderHeader(tr('cashTitle'), tr('cashHint'), tr('step') + ' 4/5') +
          '<div class="cashbox">' +
            '<section class="panel cash-left">' +
              summaryMini() +
              renderCostSummary() +
              '<div class="cash-slot">' + esc(tr('cashSlot')) + '</div>' +
              '<div class="cash-grid">' + buttons.join('') + '</div>' +

            '<aside class="panel cash-right">' +

              '<div class="summary-card" style="min-height:110px;margin-top:10px"><span>' + esc(tr('remaining')) + '</span><strong>' + esc(money(remaining)) + '</strong></div>' +

            '<div class="progress"><span></span></div>' +
            summaryFull() +
          '</section>'
        );

      function renderReceipt(receipt, fromHistory) {
        if (!receipt) receipt = state.currentReceipt;
        if (!receipt) return renderHome();
        return renderFrame(
          renderHeader(tr('receiptTitle'), tr('success'), tr('receiptStatus')) +
          '<div class="receipt">' +
            '<h2>' + esc(tr('receiptTitle')) + '</h2>' +
            receiptRow(tr('receiptNo'), receipt.id) +
            receiptRow(tr('date'), receipt.date) +
            receiptRow(tr('service'), receiptServiceName(receipt)) +
            receiptRow(tr('provider'), receiptProviderName(receipt)) +
            receiptRow(tr('target'), receipt.target || tr('noDataInput')) +
            receiptRow(tr('amount'), money(receipt.amount)) +
            receiptRow(tr('fee'), money(receipt.fee)) +
            receiptRow(tr('inserted'), money(receipt.inserted)) +
            receiptRow(tr('credited'), money(receipt.credited)) +
            receiptRow(tr('status'), tr('success')) +
            '<div class="receipt-ok">' + esc(tr('success')) + '</div>' +
          '</div>' +
          renderActions([
            { action: 'print', label: tr('print'), cls: 'secondary' },
            { action: fromHistory ? 'history' : 'home', label: tr('newOperation'), cls: 'success' }
          ], 'receipt-actions')
        );
      }

      function receiptRow(label, value) {
        return '<div class="receipt-row"><span>' + esc(label) + '</span><strong>' + esc(value) + '</strong></div>';
      }

      function receiptServiceName(receipt) {
        var cat = receipt && receipt.categoryId ? findCategory(receipt.categoryId) : null;
        return cat ? categoryName(cat) : (receipt.service || '');
      }

      function receiptProviderName(receipt) {
        var cat = receipt && receipt.categoryId ? findCategory(receipt.categoryId) : null;
        var provider = receipt && receipt.providerId ? findProvider(cat, receipt.providerId) : null;
        return provider ? providerName(provider) : (receipt.provider || '');
      }

      function renderHistory() {
        var items = [];
        for (var i = 0; i < state.history.length; i += 1) {
          var r = state.history[i];
          items.push(
            '<button class="history-item" data-action="open-history" data-index="' + i + '">' +
              '<h3>' + esc(receiptServiceName(r)) + '</h3>' +
              '<p class="small-muted">' + esc(r.date) + '</p>' +
              '<div class="summary" style="margin:10px 0 0">' +
                '<div class="summary-card" style="min-height:62px"><span>' + esc(tr('inserted')) + '</span><strong>' + esc(money(r.inserted)) + '</strong></div>' +
                '<div class="summary-card" style="min-height:62px"><span>' + esc(tr('status')) + '</span><strong>' + esc(tr('success')) + '</strong></div>' +
              '</div>' +
            '</button>'
          );
        }
        return renderFrame(
          renderHeader(tr('history'), '', tr('terminalReady')) +
          (items.length ? '<div class="history-list">' + items.join('') + '</div>' : '<div class="notice">' + esc(tr('emptyHistory')) + '</div>')
        );

      function renderHelp() {
        return renderFrame(
          renderHeader(tr('help'), tr('introLine'), tr('terminalReady')) +
          '<div class="help-grid">' +
            helpCard(tr('help1Title'), tr('help1')) +
            helpCard(tr('help2Title'), tr('help2')) +
            helpCard(tr('help3Title'), tr('help3')) +
          '</div>'
        );

      function helpCard(title, text) {
        return '<section class="panel"><h3>' + esc(title) + '</h3><p>' + esc(text) + '</p></section>';
      }

      function renderActions(actions, extraClass) {
        var html = [];
        for (var i = 0; i < actions.length; i += 1) {
          var a = actions[i];
          html.push('<button class="action-btn ' + esc(a.cls || '') + '" data-action="' + esc(a.action) + '"' + (a.disabled ? ' disabled' : '') + '>' + esc(a.label) + '</button>');
        }
        return '<div class="actions ' + esc(extraClass || '') + '">' + html.join('') + '</div>';

      function renderKeypad() {
        var keys = ['1', '2', '3', '4', '5', '6', '7', '8', '9', 'clear', '0', 'backspace'];
        var out = [];
        for (var i = 0; i < keys.length; i += 1) {
          var key = keys[i];
          if (key === 'clear') {
            out.push('<button class="key utility" data-action="key" data-key="clear">' + esc(tr('clear')) + '</button>');
          } else if (key === 'backspace') {
            out.push('<button class="key utility" data-action="key" data-key="backspace">' + esc(tr('erase')) + '</button>');
          } else {
            out.push('<button class="key" data-action="key" data-key="' + key + '">' + key + '</button>');
          }
        }
        return '<div class="keypad">' + out.join('') + '</div>';
      }

      function summaryMini() {
        var cat = currentCategory();
        var provider = currentProvider();
        return '<div class="summary">' +
          '<div class="summary-card"><span>' + esc(tr('service')) + '</span><strong>' + esc(categoryName(cat)) + '</strong></div>' +
          '<div class="summary-card"><span>' + esc(tr('provider')) + '</span><strong>' + esc(providerName(provider)) + '</strong></div>' +
        '</div>';
      }

      function renderCostSummary() {
        var amount = Number(state.amount || 0);
        var fee = calcFee(amount);
        var total = amount + fee;
        return '<div class="summary">' +
          '<div class="summary-card"><span>' + esc(tr('amount')) + '</span><strong>' + esc(money(amount)) + '</strong></div>' +
          '<div class="summary-card"><span>' + esc(tr('fee')) + '</span><strong>' + esc(money(fee)) + '</strong></div>' +
          '<div class="summary-card"><span>' + esc(tr('total')) + '</span><strong>' + esc(money(total)) + '</strong></div>' +
        '</div>';
      }

      function summaryFull() {
        var amount = Number(state.amount || 0);
        var fee = calcFee(amount);
        var total = amount + fee;
        var credited = Math.max(0, state.cash - fee);
        var extra = Math.max(0, credited - amount);
        return '<div class="summary">' +
          '<div class="summary-card"><span>' + esc(tr('service')) + '</span><strong>' + esc(categoryName(currentCategory())) + '</strong></div>' +
          '<div class="summary-card"><span>' + esc(tr('provider')) + '</span><strong>' + esc(providerName(currentProvider())) + '</strong></div>' +
          '<div class="summary-card"><span>' + esc(tr('target')) + '</span><strong>' + esc(maskTarget(state.target, inputType()) || tr('noDataInput')) + '</strong></div>' +
          '<div class="summary-card"><span>' + esc(tr('amount')) + '</span><strong>' + esc(money(amount)) + '</strong></div>' +
          '<div class="summary-card"><span>' + esc(tr('fee')) + '</span><strong>' + esc(money(fee)) + '</strong></div>' +
          '<div class="summary-card"><span>' + esc(tr('inserted')) + '</span><strong>' + esc(money(state.cash)) + '</strong></div>' +
          '<div class="summary-card"><span>' + esc(tr('credited')) + '</span><strong>' + esc(money(credited)) + '</strong></div>' +
          '<div class="summary-card"><span>' + esc(tr('extra')) + '</span><strong>' + esc(money(extra)) + '</strong></div>' +
        '</div>';
      }

      function calcFee(amount) {
        var provider = currentProvider();
        if (!amount || (provider && provider.noFee)) return 0;
        var fee = amount * 0.01;
        if (fee < 0.10) fee = 0.10;
        return Math.round(fee * 100) / 100;
      }

      function totalDue() {
        var amount = Number(state.amount || 0);
        return amount + calcFee(amount);
      }

      function formatTarget(value, type, masked) {
        var digits = String(value || '');
        if (!digits) return '';
        if (type === 'phone') {
          var phone = digits;
          if (masked && phone.length >= 4) {
            return '+994 ** *** ** ' + phone.slice(-2);
          }
          return '+994 ' + phone.replace(/(\d{2})(\d{3})(\d{2})(\d{2})/, '$1 $2 $3 $4');
        }
        if (type === 'card') {
          if (masked && digits.length >= 4) {
            return '**** **** **** ' + digits.slice(-4);
          }
          return digits.replace(/(\d{4})(?=\d)/g, '$1 ');
        }
        if (masked && digits.length > 4) {
          return '****' + digits.slice(-4);
        }
        return digits;
      }

      function maskTarget(value, type) {
        return formatTarget(value, type, true);
      }

      function isTargetValid() {
        var type = inputType();
        var length = state.target.length;
        if (type === 'none') return true;
        if (type === 'phone') return length === 9;
        if (type === 'card') return length === 16;
        return length >= 6 && length <= 12;
      }

      function resetFlow() {
        state.categoryId = '';
        state.providerId = '';
        state.target = '';
        state.amount = '';
        state.cash = 0;
        state.currentReceipt = null;
      }

      function resetAfterProvider() {
        state.target = '';
        state.amount = '';
        state.cash = 0;
        state.currentReceipt = null;
      }

      function createReceipt() {
        var now = new Date();
        var id = 'AZD-' + now.getFullYear() + pad(now.getMonth() + 1) + pad(now.getDate()) + '-' + Math.floor(100000 + Math.random() * 900000);
        var amount = Number(state.amount || 0);
        var fee = calcFee(amount);
        var receipt = {
          id: id,
          date: pad(now.getDate()) + '.' + pad(now.getMonth() + 1) + '.' + now.getFullYear() + ' ' + pad(now.getHours()) + ':' + pad(now.getMinutes()),
          categoryId: state.categoryId,
          providerId: state.providerId,
          service: categoryName(currentCategory()),
          provider: providerName(currentProvider()),
          target: maskTarget(state.target, inputType()),
          amount: amount,
          fee: fee,
          inserted: state.cash,
          credited: Math.max(0, state.cash - fee)
        };
        state.currentReceipt = receipt;
        state.history.unshift(receipt);
        if (state.history.length > 12) state.history.length = 12;
        saveHistory();
      }

      function loadHistory() {
        try {
          var raw = window.localStorage && (localStorage.getItem('az-terminal-history') || localStorage.getItem('az-kiosk-history'));
          return raw ? JSON.parse(raw) : [];
        } catch (e) {
          return [];
        }
      }

      function saveHistory() {
        try {
          if (window.localStorage) localStorage.setItem('az-terminal-history', JSON.stringify(state.history));
        } catch (e) {}
      }

      function handleKey(key) {
        if (state.screen !== 'input' && state.screen !== 'amount') return;
        var field = state.screen === 'input' ? 'target' : 'amount';
        var max = state.screen === 'input' ? maxTargetLength() : 3;
        if (key === 'clear') {
          state[field] = '';
        } else if (key === 'backspace') {
          state[field] = state[field].slice(0, -1);
        } else if (/^\d$/.test(key) && state[field].length < max) {
          if (field === 'amount' && state[field] === '' && key === '0') {
            return;
          }
          state[field] += key;
        }
        render();
      }

      function maxTargetLength() {
        var type = inputType();
        if (type === 'phone') return 9;
        if (type === 'card') return 16;
        return 12;
      }

      function handleAction(el) {
        var action = el.getAttribute('data-action');
        if (!action || el.disabled) return;

        if (action === 'set-lang') {
          state.lang = el.getAttribute('data-lang') || state.lang;
        } else if (action === 'go-back') {
          goBack(true);
          return;
        } else if (action === 'start-lang') {
          state.lang = el.getAttribute('data-lang') || state.lang;
          goTo('home');
          return;
        } else if (action === 'fullscreen') {
          var doc = document.documentElement;
          if (doc.requestFullscreen) doc.requestFullscreen();
          else if (doc.webkitRequestFullscreen) doc.webkitRequestFullscreen();
          else if (doc.mozRequestFullScreen) doc.mozRequestFullScreen();
          else if (doc.msRequestFullscreen) doc.msRequestFullscreen();
        } else if (action === 'home') {
          hardGoHome();
          return;
        } else if (action === 'history') {
          goTo('history');
          return;
        } else if (action === 'help') {
          goTo('help');
          return;
        } else if (action === 'select-category') {
          resetFlow();
          state.categoryId = el.getAttribute('data-category') || '';
          goTo('providers');
          return;
        } else if (action === 'select-provider') {
          resetAfterProvider();
          state.providerId = el.getAttribute('data-provider') || '';
          goTo(inputType() === 'none' ? 'amount' : 'input');
          return;
        } else if (action === 'providers') {
          goTo('providers');
          return;
        } else if (action === 'input') {
          goTo('input');
          return;
        } else if (action === 'to-amount') {
          if (isTargetValid()) {
            goTo('amount');
            return;
          }
        } else if (action === 'preset-amount') {
          state.amount = el.getAttribute('data-amount') || '';
        } else if (action === 'to-cash') {
          if (Number(state.amount || 0) >= 1) {
            state.cash = 0;
            goTo('cash');
            return;
          }
        } else if (action === 'amount') {
          goTo('amount');
          return;
        } else if (action === 'insert-cash') {
          state.cash += Number(el.getAttribute('data-cash') || 0);
        } else if (action === 'reset-cash') {
          state.cash = 0;
        } else if (action === 'to-review') {
          if (state.cash >= totalDue()) {
            goTo('review');
            return;
          }
        } else if (action === 'cash') {
          goTo('cash');
          return;
        } else if (action === 'cancel') {
          hardGoHome();
          return;
        } else if (action === 'confirm-payment') {
          if (state.processing) return;
          state.processing = true;
          state.navStack = [];
          state.screen = 'processing';
          replaceBrowserStep();
          render();
          window.setTimeout(function () {
            createReceipt();
            state.processing = false;
            state.screen = 'receipt';
            state.navStack = [];
            replaceBrowserStep();
            render();
          }, 900);
          return;
        } else if (action === 'print') {
          window.print();
          return;
        } else if (action === 'open-history') {
          var index = Number(el.getAttribute('data-index') || 0);
          state.currentReceipt = state.history[index] || null;
          goTo('receiptHistory');
          return;
        } else if (action === 'key') {
          handleKey(el.getAttribute('data-key'));
          return;
        }
        render();
      }

      function render() {
        document.documentElement.lang = state.lang;
        if (state.screen === 'language') {
          app.innerHTML = renderLanguage();
        } else if (state.screen === 'home') {
          app.innerHTML = renderHome();
        } else if (state.screen === 'providers') {
          app.innerHTML = renderProviders();
        } else if (state.screen === 'input') {
          app.innerHTML = renderInput();
        } else if (state.screen === 'amount') {
          app.innerHTML = renderAmount();
        } else if (state.screen === 'cash') {
          app.innerHTML = renderCash();
        } else if (state.screen === 'review') {
          app.innerHTML = renderReview();
        } else if (state.screen === 'processing') {
          app.innerHTML = renderProcessing();
        } else if (state.screen === 'receipt') {
          app.innerHTML = renderReceipt(state.currentReceipt, false);
        } else if (state.screen === 'receiptHistory') {
          app.innerHTML = renderReceipt(state.currentReceipt, true);
        } else if (state.screen === 'history') {
          app.innerHTML = renderHistory();
        } else if (state.screen === 'help') {
          app.innerHTML = renderHelp();
        } else {
          state.screen = 'home';
          app.innerHTML = renderHome();
        }
        updateClock();
      }

      app.onclick = function (event) {
        var el = event.target;
        while (el && el !== app && !el.getAttribute('data-action')) {
          el = el.parentNode;
        }
        if (el && el.getAttribute('data-action')) {
          handleAction(el);
        }
      };

      initBrowserNavigation();
      render();
      clockTimer = window.setInterval(updateClock, 30000);
      if (!clockTimer) updateClock();
    }());
  </script>
</body>
</html>
